<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github User Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="heading-box">
            <h1> <i class="fa-brands fa-github" aria-hidden="true"></i> Github User Finder</h1>
            <p>Search for any Github user to see their profile</p>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Username" class="search">
            <button class="search-btn">Search</button>
        </div>



            <div class="profile-box"></div>
            <div class="user-repo hidden" aria-labelledby="repo-title">
                        <h2 id="repo-title" class="hidden">Latest Repositories</h2>
                        <div id="repos-container" class="repos-container">
                        </div>
            </div>
            <div id="error-container" class="hidden">
                <p>No user found. Try another username</p>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
