<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Palette Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>Colour Palette Generator</h1>
        </div>

        <div class="button-div ">
            <button id="generate-btn"><i class="fas fa-sync-alt"></i> Generate Palette</button>
        </div>

        <div class="palette-container">

            <div class="color-box">
                <div class="color" style="background-color: aliceblue;"></div>
                <div class="color-info">
                    <span class="hex-value">#EIF5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>

            <div class="color-box">
                <div class="color" style="background-color: red;"></div>
                <div class="color-info">
                    <span class="hex-value">#EIF5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>

            <div class="color-box">
                <div class="color" style="background-color: yellow;"></div>
                <div class="color-info">
                    <span class="hex-value">#EIF5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>

            <div class="color-box">
                <div class="color" style="background-color: blue;"></div>
                <div class="color-info">
                    <span class="hex-value">#EIF5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>

            <div class="color-box">
                <div class="color" style="background-color: green;"></div>
                <div class="color-info">
                    <span class="hex-value">#EIF5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            
        </div>
    </div>





    <script src="script.js"></script>
</body>
</html>
