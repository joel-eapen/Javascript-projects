<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <h1>Expense Tracker</h1>

        <section class="balance-card" aria-labelledby="balance-title">
            <p id="balance-title" class="balance-label">Your Balance</p>
            <p class="balance-amount" id="balance">$0.00</p>

            <div class="summary-grid">
                <article class="summary-card income-card">
                    <h2>Income</h2>
                    <p id="income">$0.00</p>
                </article>

                <article class="summary-card expense-card">
                    <h2>Expenses</h2>
                    <p id="expenses">$0.00</p>
                </article>
            </div>
        </section>

        <section class="tracker-content">
            <div class="transactions-panel">
                <h2>Transactions</h2>
                <ul class="transaction-list" id="transaction-list"></ul>
            </div>

            <form class="transaction-form" id="transaction-form">
                <h2>Add Transaction</h2>

                <label for="description">Description</label>
                <input
                    type="text"
                    id="description"
                    name="description"
                    placeholder="Enter description..."
                >

                <label for="amount">Amount</label>
                <input
                    type="number"
                    id="amount"
                    name="amount"
                    placeholder="Enter amount..."
                    step="0.01"
                >
                <p class="form-help">Use negative (-) for expenses</p>

                <button type="submit" class="js-submit-btn">Add Transaction</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
