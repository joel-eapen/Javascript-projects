<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <div class="quiz-heading">
                <h1>Quiz Time!</h1>
            </div>
            <div class="quiz-decription">
                <p>Test your knowledge with these fun questions!</p>
            </div>
            <div class="quiz-start-btn">
                <button id="start-btn">Start Quiz</button>
            </div>
        </div>


        <div class="screen quiz-time" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Questions(updated through js)</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span id="total-questions">5</span>
                    </p>
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>

            <div class="answer-container">
                <button>Option1</button>
                <button>Option2</button>
                <button>Option3</button>
                <button>Option4</button>
            </div>

            <div class="progress-bar">

            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
